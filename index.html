<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlgoViz Pro — Advanced Sorting Algorithm Visualizer</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=JetBrains+Mono:wght@400;500&amp;display=swap" rel="stylesheet">
</head>
<body>
    <div class="app">
        <!-- HEADER -->
        <header class="header">
            <div class="logo">
                <h1>AlgoViz <span class="neon-text">Pro</span></h1>
                <p class="tagline">Advanced Real-Time Sorting Visualizer</p>
            </div>
            <div class="header-actions">
                <button id="theme-toggle" class="btn-icon" title="Toggle Dark/Light Mode">🌙</button>
                <div class="mode-switch">
                    <button id="single-mode-btn" class="mode-btn active">Single</button>
                    <button id="compare-mode-btn" class="mode-btn">Compare</button>
                </div>
                <button id="sound-btn" class="btn-icon active" title="Sound">🔊</button>
            </div>
        </header>

        <div class="main-grid">
            <!-- LEFT CONTROL PANEL -->
            <div class="control-panel glass">
                <div class="panel-header">
                    <h2>Controls</h2>
                </div>

                <div class="control-item">
                    <label>Algorithm</label>
                    <select id="algo-select" class="neo-select">
                        <option value="bubble">Bubble Sort</option>
                        <option value="selection">Selection Sort</option>
                        <option value="insertion">Insertion Sort</option>
                        <option value="merge">Merge Sort</option>
                        <option value="quick">Quick Sort</option>
                        <option value="heap">Heap Sort</option>
                    </select>
                </div>

                <div class="control-item">
                    <div class="slider-label">
                        <span>Array Size</span>
                        <span id="size-value" class="value">50</span>
                    </div>
                    <input type="range" id="size-slider" min="10" max="150" value="50" step="1">
                </div>

                <div class="control-item">
                    <div class="slider-label">
                        <span>Animation Speed</span>
                        <span id="speed-value" class="value">Medium</span>
                    </div>
                    <input type="range" id="speed-slider" min="1" max="100" value="40" step="1">
                </div>

                <div class="data-modes">
                    <button id="random-btn" class="data-btn active">Random</button>
                    <button id="sorted-btn" class="data-btn">Sorted</button>
                    <button id="reverse-btn" class="data-btn">Reverse</button>
                </div>

                <div class="action-buttons">
                    <button id="generate-btn" class="btn-primary">⟳ Generate New Array</button>
                    <button id="start-btn" class="btn-accent">▶ Start Sorting</button>
                    <button id="pause-btn" class="btn-secondary hidden">⏸ Pause</button>
                    <button id="resume-btn" class="btn-secondary hidden">▶ Resume</button>
                    <button id="reset-btn" class="btn-secondary">⟲ Reset</button>
                </div>

                <div class="toggle-row">
                    <label class="switch-label">
                        <input type="checkbox" id="pseudocode-toggle" checked>
                        <span>Show Pseudo Code</span>
                    </label>
                </div>
            </div>

            <!-- VISUALIZATION AREA -->
            <div class="viz-wrapper">
                <!-- SINGLE MODE -->
                <div id="single-container" class="viz-container active">
                    <div class="viz-header">
                        <h2 id="single-algo-title">Bubble Sort</h2>
                        <div id="single-status" class="status-badge">Ready</div>
                    </div>
                    <div id="single-bars" class="bars-container"></div>
                </div>

                <!-- COMPARE MODE -->
                <div id="compare-container" class="viz-container">
                    <div class="compare-grid">
                        <div class="compare-column">
                            <div class="viz-header">
                                <select id="compare-algo-1" class="neo-select small">
                                    <option value="bubble">Bubble Sort</option>
                                    <option value="selection">Selection Sort</option>
                                    <option value="insertion">Insertion Sort</option>
                                    <option value="merge">Merge Sort</option>
                                    <option value="quick">Quick Sort</option>
                                    <option value="heap">Heap Sort</option>
                                </select>
                                <div id="compare-status-1" class="status-badge">Ready</div>
                            </div>
                            <div id="compare-bars-1" class="bars-container small"></div>
                        </div>
                        <div class="compare-column">
                            <div class="viz-header">
                                <select id="compare-algo-2" class="neo-select small">
                                    <option value="selection">Selection Sort</option>
                                    <option value="bubble">Bubble Sort</option>
                                    <option value="insertion">Insertion Sort</option>
                                    <option value="merge">Merge Sort</option>
                                    <option value="quick">Quick Sort</option>
                                    <option value="heap">Heap Sort</option>
                                </select>
                                <div id="compare-status-2" class="status-badge">Ready</div>
                            </div>
                            <div id="compare-bars-2" class="bars-container small"></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- RIGHT PANEL -->
            <div class="right-panel">
                <!-- ANALYTICS -->
                <div class="glass panel analytics-panel">
                    <h3>📊 Real-Time Analytics</h3>
                    <div class="stat-grid">
                        <div class="stat">
                            <span class="stat-label">Comparisons</span>
                            <span id="stat-comparisons" class="stat-value">0</span>
                        </div>
                        <div class="stat">
                            <span class="stat-label">Swaps</span>
                            <span id="stat-swaps" class="stat-value">0</span>
                        </div>
                        <div class="stat">
                            <span class="stat-label">Time</span>
                            <span id="stat-time" class="stat-value">0 ms</span>
                        </div>
                    </div>
                </div>

                <!-- COMPLEXITY -->
                <div class="glass panel complexity-panel">
                    <h3>⚡ Complexity</h3>
                    <div id="complexity-content">
                        <!-- Populated by JS -->
                    </div>
                </div>

                <!-- PSEUDO CODE -->
                <div id="pseudocode-panel" class="glass panel pseudocode-panel">
                    <h3>📜 Pseudo Code</h3>
                    <pre id="pseudocode-code" class="pseudocode"><code></code></pre>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
                    </html>
